services:

  # ── Shared LLM backend ──────────────────────────────────────────────────────
  # All experiment variants (BM25, Vector, Graph) route their LLM calls here.
  # Models are persisted in the ollama_models volume so they survive rebuilds.
  #
  ollama:
    image: ollama/ollama:latest
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ── Vector store (Model B only) ─────────────────────────────────────────────
  # ChromaDB HTTP server for VectorMemory. Runs as a persistent sidecar so the
  # vector index survives container restarts. Only the vector_rag variant talks
  # to this service; BM25 and GraphRAG do not depend on it.
  chromadb:
    image: chromadb/chroma:0.6.3
    volumes:
      - chroma_data:/data
    ports:
      - "8000:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped

  # ── Pipeline application ────────────────────────────────────────────────────
  # Runs main.py — pass arguments via: docker compose run --rm app --variant NAME --ingest --qa
  # data/ and evaluations/ are bind-mounted so results persist on the host.
  # The HuggingFace cache volume avoids re-downloading embedding models on
  # every container start (~400 MB for BAAI/bge-base-en-v1.5).
  app:
    build: .
    depends_on:
      ollama:
        condition: service_healthy
      chromadb:
        condition: service_started
    environment:
      - OLLAMA_API_BASE=http://ollama:11434
      - CHROMA_HOST=http://chromadb:8000
    volumes:
      - ./data:/app/data
      - ./evaluations:/app/evaluations
      - huggingface_cache:/root/.cache/huggingface

volumes:
  ollama_models:
  huggingface_cache:
  chroma_data:
