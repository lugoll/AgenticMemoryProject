# Unified experiment configuration
# All model names must use "provider/model" format for LiteLLM routing.
# Variants carry only overrides; the loader deep-merges them with defaults.

# --- Shared infrastructure ---
telemetry:
  log_level: "INFO"
  output_dir: "evaluations/"

# --- Default experiment parameters ---
# All variants inherit these unless explicitly overridden.
default:
  agent_type: "dummy" # "dummy" | "bm25" | "vector" | "graph"
  data_file: "baseline_dummy.json"

  llm:
    model: "ollama/llama3.2:3b"  # swap to e.g. ollama/llama3.1:8b for better quality
    temperature: 0.0
    max_tokens: 2048
    # api_base: resolved automatically from OLLAMA_API_BASE env var (set by docker-compose)

  embedding:
    model: "huggingface/BAAI/bge-base-en-v1.5"  # local, MIT license, ~400 MB
    batch_size: 32

  retrieval:
    top_k: 5
    similarity_cutoff: 0.7

  ingestion:
    chunk_size: 300   # HotpotQA supporting facts are short paragraphs (~120 words)
    chunk_overlap: 50

# --- Named experiment variants ---
# Each variant inherits all defaults and overrides only what differs.
# agent_type  → which memory backend and agent class is used (see factory.py)
# data_file   → JSON file in data/raw/ with "documents" and "questions" keys
# memory_path → where the memory store is persisted between --ingest and --qa runs
variants:

  # Smoke test — substring scoring, no LLM, no embeddings
  baseline_dummy:
    agent_type: "dummy"
    data_file: "baseline_dummy.json"
    memory_path: "data/processed/baseline_dummy.json"

  # Model A — keyword search baseline (SQLite FTS5, BM25 ranking, no LLM at retrieval)
  bm25_baseline:
    agent_type: "bm25"
    data_file: "baseline_dummy.json"
    memory_path: "data/processed/bm25_baseline.db"

  # Model B — Vector RAG (ChromaDB HTTP server + BAAI/bge-base-en-v1.5 embeddings)
  vector_rag:
    agent_type: "vector"
    data_file: "hotpotqa_distractor.json"
    memory_path: "vector_hotpotqa"   # ChromaDB collection name

  # Model C — GraphRAG (LLM entity extraction at ingest, BFS at retrieval)
  graph_v1:
    agent_type: "graph"
    data_file: "multihop_benchmark.json"
    memory_path: "data/processed/graph_v1.json"
